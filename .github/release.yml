changelog:
  exclude:
    labels:
      - skip-changelog
      - invalid
      - duplicate
      - question
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - semver-major
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - bugfix
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Maintenance
      labels:
        - chore
        - dependencies
        - ci
        - release
    - title: Other Changes
      labels:
        - '*'

change-template: '- $TITLE by @$AUTHOR in #$NUMBER'
template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

  **Full Changelog**: $PREVIOUS_TAG...$TAG
