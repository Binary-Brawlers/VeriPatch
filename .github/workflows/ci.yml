name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Check
            command: cargo check --workspace --all-targets
            components: ""
            needs_linux_deps: true
            verify_linux_deps: true
            use_cache: true
          - name: Test
            command: cargo test --workspace
            components: ""
            needs_linux_deps: true
            verify_linux_deps: false
            use_cache: true
          - name: Clippy
            command: cargo clippy --workspace --all-targets -- -D warnings
            components: clippy
            needs_linux_deps: true
            verify_linux_deps: false
            use_cache: true
          - name: Format
            command: cargo fmt --all -- --check
            components: rustfmt
            needs_linux_deps: false
            verify_linux_deps: false
            use_cache: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.needs_linux_deps
        uses: ./.github/actions/install-linux-deps

      - name: Verify Linux native dependencies
        if: matrix.verify_linux_deps
        run: |
          set -euo pipefail
          for module in \
            glib-2.0 gobject-2.0 gio-2.0 gdk-3.0 gtk+-3.0 \
            webkit2gtk-4.1 javascriptcoregtk-4.1 libsoup-3.0; do
            pkg-config --exists "$module"
          done

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.components == ''

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.components != ''
        with:
          components: ${{ matrix.components }}

      - uses: Swatinem/rust-cache@v2
        if: matrix.use_cache
        with:
          shared-key: ci-ubuntu-stable

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
