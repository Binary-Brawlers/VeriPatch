name: Install Linux Dependencies
description: Install the Linux native packages required to build VeriPatch.

inputs:
  extra-packages:
    description: Additional apt packages to install.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      env:
        EXTRA_PACKAGES: ${{ inputs.extra-packages }}
      run: |
        set -euxo pipefail

        packages=(
          pkg-config
          libglib2.0-dev
          libgtk-3-dev
          libwebkit2gtk-4.1-dev
          libjavascriptcoregtk-4.1-dev
          libsoup-3.0-dev
        )

        if [[ -n "$EXTRA_PACKAGES" ]]; then
          read -r -a extra_packages <<< "$EXTRA_PACKAGES"
          packages+=("${extra_packages[@]}")
        fi

        sudo apt-get update
        sudo apt-get install -y "${packages[@]}"
        sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev
