name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      is_beta: ${{ steps.info.outputs.is_beta }}
    steps:
      - name: Extract version info
        id: info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-beta"* ]]; then
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Linux system dependencies for GPUI
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libglib2.0-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libwayland-dev libvulkan-dev libfontconfig-dev \
            libfreetype6-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Verify Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          for module in \
            glib-2.0 gobject-2.0 gio-2.0 gdk-3.0 gtk+-3.0 \
            webkit2gtk-4.1 javascriptcoregtk-4.1 libsoup-3.0; do
            pkg-config --exists "$module"
          done

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p veripatch-app -p veripatch-cli

      # Package binaries
      - name: Package (Unix)
        id: package_unix
        if: runner.os != 'Windows'
        run: |
          STAGING="veripatch-${{ needs.meta.outputs.version }}-${{ matrix.target }}"
          mkdir "$STAGING"
          cp target/${{ matrix.target }}/release/veripatch "$STAGING/" || true
          cp target/${{ matrix.target }}/release/veripatch-cli "$STAGING/" || true
          cp README.md LICENSE-MIT LICENSE-APACHE "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"
          echo "asset=$STAGING.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Package (Windows)
        id: package_windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $STAGING = "veripatch-${{ needs.meta.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $STAGING
          Copy-Item "target/${{ matrix.target }}/release/veripatch.exe" "$STAGING/" -ErrorAction SilentlyContinue
          Copy-Item "target/${{ matrix.target }}/release/veripatch-cli.exe" "$STAGING/" -ErrorAction SilentlyContinue
          Copy-Item "README.md","LICENSE-MIT","LICENSE-APACHE" "$STAGING/"
          Compress-Archive -Path "$STAGING/*" -DestinationPath "$STAGING.zip"
          echo "asset=$STAGING.zip" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.package_unix.outputs.asset || steps.package_windows.outputs.asset }}
          retention-days: 1

  publish:
    name: Publish release
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.version }}
          name: "VeriPatch ${{ needs.meta.outputs.version }}"
          prerelease: ${{ needs.meta.outputs.is_beta == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/*
