name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      is_beta: ${{ steps.info.outputs.is_beta }}
    steps:
      - name: Extract version info
        id: info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-beta"* ]]; then
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
            bundles: ""
          - target: aarch64-apple-darwin
            os: macos-14
            bundles: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            bundles: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bundles: " --bundles nsis"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-deps
        with:
          extra-packages: libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev libvulkan-dev libfontconfig-dev libfreetype6-dev

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/veripatch-app
          args: --target ${{ matrix.target }}${{ matrix.bundles }}
          tagName: ${{ needs.meta.outputs.version }}
          releaseName: VeriPatch ${{ needs.meta.outputs.version }}
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ needs.meta.outputs.is_beta == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build veripatch-cli
        run: cargo build --release --target ${{ matrix.target }} -p veripatch-cli

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          STAGING="veripatch-cli-${{ needs.meta.outputs.version }}-${{ matrix.target }}"
          mkdir "$STAGING"
          cp target/${{ matrix.target }}/release/veripatch-cli "$STAGING/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $STAGING = "veripatch-cli-${{ needs.meta.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $STAGING
          Copy-Item "target/${{ matrix.target }}/release/veripatch-cli.exe" "$STAGING/"
          Copy-Item "README.md","LICENSE-MIT","LICENSE-APACHE" "$STAGING/"
          Compress-Archive -Path "$STAGING/*" -DestinationPath "$STAGING.zip"

      - name: Upload CLI artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: veripatch-cli-${{ needs.meta.outputs.version }}-${{ matrix.target }}.tar.gz
          retention-days: 1

      - name: Upload CLI artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: veripatch-cli-${{ needs.meta.outputs.version }}-${{ matrix.target }}.zip
          retention-days: 1

  cli-publish:
    name: Publish CLI assets
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cli-*
          merge-multiple: true

      - name: Generate CLI checksums
        run: |
          cd artifacts
          sha256sum * > checksums-sha256.txt

      - name: Upload CLI files to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.version }}
          files: |
            artifacts/*
